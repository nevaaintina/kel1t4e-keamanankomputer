<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEL1T4E_HASH - Security System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: #e2e8f0; }
        .cyber-card { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; backdrop-filter: blur(12px); }
        input[type=range] { accent-color: #10b981; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-white tracking-tighter italic uppercase tracking-widest">KEL1T4E<span class="text-emerald-400 text-3xl">_HASH_V2</span></h1>
            <p class="text-slate-500 text-[10px] tracking-[0.5em] uppercase mt-2">Static Client-Side Security Analyzer</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="cyber-card p-8 rounded-[2rem] shadow-2xl">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-8 flex items-center"><i data-lucide="cpu" class="mr-2 w-4 h-4"></i> Encryption Engine</h2>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Algorithm</label>
                            <select id="algoSelect" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-xs text-slate-300 outline-none focus:border-emerald-500">
                                <option value="SHA-256">SHA-256</option>
                                <option value="SHA-384">SHA-384</option>
                                <option value="SHA-512">SHA-512</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Rounds: <span id="rVal" class="text-emerald-400">10</span></label>
                            <input type="range" id="roundsInput" min="1" max="100" value="10" class="w-full h-1.5 bg-slate-800 rounded-lg cursor-pointer mt-3" oninput="document.getElementById('rVal').innerText = this.value">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block">Input Data</label>
                        <input type="text" id="inputText" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-emerald-500 text-sm font-medium" placeholder="Type text to secure...">
                    </div>
                    <button onclick="generateHash()" class="w-full bg-emerald-500 text-slate-950 font-black py-4 rounded-2xl uppercase text-xs tracking-[0.2em] hover:bg-emerald-400 transition-all active:scale-95">Generate Secure Hash</button>

                    <div id="resultBox" class="hidden mt-8 p-5 bg-emerald-500/5 border border-emerald-500/20 rounded-2xl animate-in fade-in duration-500">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Hash Result</span>
                            <button onclick="copyToVerify()" class="bg-emerald-500/20 text-emerald-400 p-1.5 rounded-lg hover:bg-emerald-500 hover:text-white transition"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                        </div>
                        <code id="hashOutput" class="block text-[10px] text-emerald-400/90 break-all font-mono bg-slate-950/50 p-3 rounded-xl border border-slate-800 mb-2"></code>
                        <div class="flex justify-between text-[8px] uppercase font-bold text-slate-600">
                            <span>Salt: <span id="saltOutput" class="text-slate-400"></span></span>
                            <span>Status: SECURED</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="cyber-card p-8 rounded-[2rem] shadow-2xl relative overflow-hidden">
                <h2 class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-8 flex items-center"><i data-lucide="shield-check" class="mr-2 w-4 h-4"></i> Integrity Validator</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="vAlgo" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-xs text-slate-300">
                            <option value="SHA-256">SHA-256</option>
                            <option value="SHA-384">SHA-384</option>
                            <option value="SHA-512">SHA-512</option>
                        </select>
                        <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex items-center justify-between">
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Rounds</span>
                            <span id="vRDisplay" class="text-xs font-bold text-blue-400">10</span>
                        </div>
                    </div>
                    <input type="hidden" id="vSalt" value="">
                    <input type="hidden" id="vRounds" value="10">

                    <input type="text" id="vHashInput" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-[10px] font-mono text-slate-400 outline-none" placeholder="Paste target hash...">
                    <input type="text" id="vTextInput" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-sm" placeholder="Re-enter original text...">
                    
                    <button onclick="verifyHash()" class="w-full border-2 border-blue-500/30 text-blue-400 font-black py-4 rounded-2xl uppercase text-xs tracking-[0.2em] hover:bg-blue-500/10 transition-all active:scale-95">Validate Integrity</button>

                    <div id="vResult" class="hidden mt-6 p-5 rounded-2xl border-2 flex items-center">
                        <i id="vIcon" data-lucide="shield-check" class="mr-4 w-6 h-6"></i>
                        <p id="vText" class="font-black text-xs tracking-widest uppercase"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Fungsi Hash Utama dengan Rounds & Salt
        async function hashWithRounds(password, salt, algo, rounds) {
            let current = new TextEncoder().encode(salt + password);
            for (let i = 0; i < rounds; i++) {
                const hashBuffer = await crypto.subtle.digest(algo, current);
                if (i === rounds - 1) {
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                }
                current = new Uint8Array(hashBuffer);
            }
        }

        // Generate Salt Acak
        function generateSalt(length = 16) {
            return Array.from(crypto.getRandomValues(new Uint8Array(length / 2)))
                        .map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function generateHash() {
            const text = document.getElementById('inputText').value;
            const algo = document.getElementById('algoSelect').value;
            const rounds = parseInt(document.getElementById('roundsInput').value);
            
            if(!text) return alert("Please enter text!");

            const salt = generateSalt();
            const hash = await hashWithRounds(text, salt, algo, rounds);

            document.getElementById('hashOutput').innerText = hash;
            document.getElementById('saltOutput').innerText = salt;
            document.getElementById('resultBox').classList.remove('hidden');
            
            // Simpan metadata sementara untuk mempermudah transfer data
            window.lastMeta = { hash, salt, algo, rounds };
        }

        function copyToVerify() {
            if(!window.lastMeta) return;
            document.getElementById('vHashInput').value = window.lastMeta.hash;
            document.getElementById('vSalt').value = window.lastMeta.salt;
            document.getElementById('vAlgo').value = window.lastMeta.algo;
            document.getElementById('vRounds').value = window.lastMeta.rounds;
            document.getElementById('vRDisplay').innerText = window.lastMeta.rounds;
            alert("Metadata Transferred to Validator!");
        }

        async function verifyHash() {
            const hInput = document.getElementById('vHashInput').value.trim();
            const tInput = document.getElementById('vTextInput').value.trim();
            const salt = document.getElementById('vSalt').value;
            const algo = document.getElementById('vAlgo').value;
            const rounds = parseInt(document.getElementById('vRounds').value);
            
            if(!hInput || !tInput || !salt) return alert("Metadata missing!");

            const hashed = await hashWithRounds(tInput, salt, algo, rounds);
            const resBox = document.getElementById('vResult');
            const resText = document.getElementById('vText');
            
            resBox.classList.remove('hidden');
            if(hashed === hInput.toLowerCase()) {
                resText.innerText = "RESULT: MATCH";
                resBox.className = "mt-6 p-5 rounded-2xl border-2 border-emerald-500/30 bg-emerald-500/10 text-emerald-400 flex items-center";
            } else {
                resText.innerText = "RESULT: NOT MATCH";
                resBox.className = "mt-6 p-5 rounded-2xl border-2 border-red-500/30 bg-red-500/10 text-red-400 flex items-center";
            }
        }
    </script>
</body>
</html>
