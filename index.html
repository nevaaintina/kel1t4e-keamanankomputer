<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEL1T4E_HASH - Advanced Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: #e2e8f0; }
        .cyber-card { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; backdrop-filter: blur(12px); }
        input[type=range] { accent-color: #10b981; }
        .strength-bar { height: 4px; border-radius: 2px; transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-white tracking-tighter italic uppercase">KEL1T4E<span class="text-emerald-400 text-3xl">_PRO_X</span></h1>
            <p class="text-slate-500 text-[10px] tracking-[0.5em] uppercase mt-2">Stealth Salt & Data Strength Analyzer</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="cyber-card p-8 rounded-[2rem] shadow-2xl relative">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-8 flex items-center"><i data-lucide="zap" class="mr-2 w-4 h-4"></i> Encryption Engine</h2>
                
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Algorithm</label>
                            <select id="algoSelect" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-xs text-slate-300 outline-none focus:border-emerald-500">
                                <option value="SHA-256">SHA-256</option>
                                <option value="SHA-384">SHA-384</option>
                                <option value="SHA-512">SHA-512</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Rounds: <span id="rVal" class="text-emerald-400">10</span></label>
                            <input type="range" id="roundsInput" min="1" max="100" value="10" class="w-full mt-3" oninput="document.getElementById('rVal').innerText = this.value">
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block">Input Data</label>
                        <input type="text" id="inputText" oninput="updateStrength(this.value)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-emerald-500 text-sm" placeholder="Enter sensitive data...">
                        
                        <div class="flex gap-1">
                            <div id="s1" class="strength-bar w-1/4 bg-slate-800"></div>
                            <div id="s2" class="strength-bar w-1/4 bg-slate-800"></div>
                            <div id="s3" class="strength-bar w-1/4 bg-slate-800"></div>
                            <div id="s4" class="strength-bar w-1/4 bg-slate-800"></div>
                        </div>
                        <p id="strengthText" class="text-[9px] font-bold text-slate-600 uppercase">Strength: None</p>
                    </div>

                    <button onclick="generateHash()" class="w-full bg-emerald-500 text-slate-950 font-black py-4 rounded-2xl uppercase text-xs tracking-[0.2em] hover:bg-emerald-400 transition-all active:scale-95">Generate Secure Hash</button>

                    <div id="resultBox" class="hidden mt-8 p-5 bg-emerald-500/5 border border-emerald-500/20 rounded-2xl animate-in fade-in duration-500">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Hash Output</span>
                            <button onclick="transferMetadata()" class="bg-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded-lg text-[9px] font-bold hover:bg-emerald-500 hover:text-white transition flex items-center gap-2">
                                <i data-lucide="arrow-right-left" class="w-3 h-3"></i> SYNC TO VALIDATOR
                            </button>
                        </div>
                        <code id="hashOutput" class="block text-[10px] text-emerald-400/90 break-all font-mono bg-slate-950/50 p-3 rounded-xl border border-slate-800"></code>
                    </div>
                </div>
            </div>

            <div class="cyber-card p-8 rounded-[2rem] shadow-2xl">
                <h2 class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-8 flex items-center"><i data-lucide="shield-check" class="mr-2 w-4 h-4"></i> Integrity Validator</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex items-center justify-between">
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Algo</span>
                            <span id="vAlgoDisplay" class="text-[10px] font-bold text-blue-400">SHA-256</span>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex items-center justify-between">
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Rounds</span>
                            <span id="vRDisplay" class="text-[10px] font-bold text-blue-400">10</span>
                        </div>
                    </div>

                    <input type="text" id="vHashInput" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-[10px] font-mono text-slate-400 outline-none" placeholder="Target Hash to compare...">
                    <input type="text" id="vTextInput" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-sm" placeholder="Confirm original data...">
                    
                    <input type="hidden" id="vSaltHidden">
                    <input type="hidden" id="vAlgoHidden" value="SHA-256">
                    <input type="hidden" id="vRoundsHidden" value="10">

                    <button onclick="verifyHash()" class="w-full border-2 border-blue-500/30 text-blue-400 font-black py-4 rounded-2xl uppercase text-xs tracking-[0.2em] hover:bg-blue-500/10 transition-all active:scale-95">Validate Integrity</button>

                    <div id="vResult" class="hidden mt-6 p-5 rounded-2xl border-2 flex items-center">
                        <i id="vIcon" data-lucide="shield" class="mr-4 w-6 h-6"></i>
                        <p id="vText" class="font-black text-xs tracking-widest uppercase"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentMetadata = { salt: '', algo: '', rounds: 10 };

        // 1. Kekuatan Data (Strength Meter)
        function updateStrength(val) {
            const bars = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
            const text = document.getElementById('strengthText');
            let score = 0;

            if (val.length > 6) score++;
            if (val.length > 10 && /[0-9]/.test(val)) score++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-emerald-500'];
            const labels = ['Weak', 'Fair', 'Strong', 'Unbreakable'];

            bars.forEach((bar, i) => {
                bar.className = 'strength-bar w-1/4 ' + (i < score ? colors[score-1] : 'bg-slate-800');
            });
            text.innerText = val ? `Strength: ${labels[score-1] || 'Weak'}` : 'Strength: None';
            text.className = `text-[9px] font-bold uppercase mt-1 ${val ? (score > 2 ? 'text-emerald-400' : 'text-red-400') : 'text-slate-600'}`;
        }

        // 2. Mesin Hashing
        async function hashWithRounds(password, salt, algo, rounds) {
            let current = new TextEncoder().encode(salt + password);
            for (let i = 0; i < rounds; i++) {
                const hashBuffer = await crypto.subtle.digest(algo, current);
                if (i === rounds - 1) {
                    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                }
                current = new Uint8Array(hashBuffer);
            }
        }

        async function generateHash() {
            const text = document.getElementById('inputText').value;
            const algo = document.getElementById('algoSelect').value;
            const rounds = parseInt(document.getElementById('roundsInput').value);
            if(!text) return alert("Fill input first!");

            const salt = Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b => b.toString(16).padStart(2, '0')).join('');
            const hash = await hashWithRounds(text, salt, algo, rounds);

            currentMetadata = { salt, algo, rounds };
            document.getElementById('hashOutput').innerText = hash;
            document.getElementById('resultBox').classList.remove('hidden');
        }

        // 3. Sinkronisasi Metadata Tersembunyi
        function transferMetadata() {
            document.getElementById('vHashInput').value = document.getElementById('hashOutput').innerText;
            document.getElementById('vSaltHidden').value = currentMetadata.salt;
            document.getElementById('vAlgoHidden').value = currentMetadata.algo;
            document.getElementById('vRoundsHidden').value = currentMetadata.rounds;
            document.getElementById('vAlgoDisplay').innerText = currentMetadata.algo;
            document.getElementById('vRDisplay').innerText = currentMetadata.rounds;
            alert("Security Metadata Synced!");
        }

        async function verifyHash() {
            const hInput = document.getElementById('vHashInput').value.trim();
            const tInput = document.getElementById('vTextInput').value.trim();
            const salt = document.getElementById('vSaltHidden').value;
            const algo = document.getElementById('vAlgoHidden').value;
            const rounds = parseInt(document.getElementById('vRoundsHidden').value);
            
            if(!salt) return alert("Sync data first!");

            const hashed = await hashWithRounds(tInput, salt, algo, rounds);
            const resBox = document.getElementById('vResult');
            const resText = document.getElementById('vText');
            
            resBox.classList.remove('hidden');
            const isMatch = (hashed === hInput.toLowerCase());
            resText.innerText = isMatch ? "INTEGRITY SECURE" : "INTEGRITY BREACHED";
            resBox.className = `mt-6 p-5 rounded-2xl border-2 flex items-center ${isMatch ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-400' : 'border-red-500/30 bg-red-500/10 text-red-400'}`;
        }
    </script>
</body>
</html>
